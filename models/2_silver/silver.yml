  - name: fact_sales
    description: >
          Fact table containing sales order lines. Each row represents a product sold as part of an order placed by a customer.
    semantic_model: 
      enabled: true
    agg_time_dimension: order_date
    columns:
      - name: id
        description: Unique identifier for the sales transaction line.
        entity:
          type: primary
          name: id

      - name: order_id
        description: Identifier of the customer order associated with the sale.
        entity: 
          type: foreign
          name: order_id

      - name: product_id
        description: Identifier of the product sold.
        entity: 
          type: foreign
          name: product_id      

      - name: customer_id
        description: Identifier of the customer who placed the order.
        entity: 
          type: foreign
          name: customer_id

      - name: employee_id
        description: Identifier of the employee responsible for processing the sale.
        entity: 
          type: foreign
          name: employee_id

      - name: shipper_id
        description: Identifier of the shipping provider responsible for delivering the order.
        entity: 
          type: foreign
          name: shipper_id

      - name: quantity
        description: Number of units sold for the product.

      - name: unit_price
        description: Selling price per unit of the product at the time of the transaction.

      - name: discount
        description: Discount applied to the sales line.

      - name: status_id
        description: Identifier of the current status of the order line.
        entity: 
          type: foreign
          name: status_id

      - name: date_allocated
        description: Date when inventory was allocated to fulfill the order.

      - name: purchase_order_id
        description: Identifier of the related purchase order, if applicable.
        entity: 
          type: foreign
          name: purchase_order_id

      - name: inventory_id
        description: Identifier of the inventory record associated with the sale.
        entity: 
          type: foreign
          name: inventory_id

      - name: order_date
        description: Date and time when the order was placed.
        granularity: day
        dimension: 
          type: time

      - name: shipped_date
        description: Date and time when the order was shipped.

      - name: paid_date
        description: Date and time when payment was received.

      - name: date_ingestion
        description: Date and time when the record was ingested into the data warehouse.

    metrics:
      - hidden: true
        name: total_quantity_sold
        description: Total number of products units sold
        type: simple
        agg: sum